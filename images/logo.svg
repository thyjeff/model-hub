<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="coreGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4f46e5;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="200" height="200" rx="40" ry="40" fill="url(#bgGrad)"/>

  <!-- Grid lines -->
  <line x1="100" y1="20" x2="100" y2="180" stroke="#6366f1" stroke-width="0.4" stroke-opacity="0.15"/>
  <line x1="20" y1="100" x2="180" y2="100" stroke="#6366f1" stroke-width="0.4" stroke-opacity="0.15"/>

  <!-- Outer orbit ring (dashed) -->
  <circle cx="100" cy="100" r="72" fill="none" stroke="url(#ringGrad)" stroke-width="2" stroke-opacity="0.5" stroke-dasharray="8 4"/>

  <!-- Middle orbit ring -->
  <circle cx="100" cy="100" r="52" fill="none" stroke="#6366f1" stroke-width="1.2" stroke-opacity="0.3"/>

  <!-- Cardinal orbit nodes -->
  <circle cx="100" cy="28" r="5" fill="#06b6d4" filter="url(#glow)" opacity="0.9"/>
  <circle cx="172" cy="100" r="5" fill="#8b5cf6" filter="url(#glow)" opacity="0.9"/>
  <circle cx="100" cy="172" r="5" fill="#06b6d4" filter="url(#glow)" opacity="0.9"/>
  <circle cx="28" cy="100" r="5" fill="#8b5cf6" filter="url(#glow)" opacity="0.9"/>

  <!-- Diagonal nodes -->
  <circle cx="151" cy="49" r="3.5" fill="#6366f1" opacity="0.7"/>
  <circle cx="151" cy="151" r="3.5" fill="#6366f1" opacity="0.7"/>
  <circle cx="49" cy="151" r="3.5" fill="#06b6d4" opacity="0.7"/>
  <circle cx="49" cy="49" r="3.5" fill="#06b6d4" opacity="0.7"/>

  <!-- Connection lines to cardinal nodes -->
  <line x1="100" y1="100" x2="100" y2="33" stroke="#6366f1" stroke-width="1" stroke-opacity="0.4"/>
  <line x1="100" y1="100" x2="167" y2="100" stroke="#8b5cf6" stroke-width="1" stroke-opacity="0.4"/>
  <line x1="100" y1="100" x2="100" y2="167" stroke="#6366f1" stroke-width="1" stroke-opacity="0.4"/>
  <line x1="100" y1="100" x2="33" y2="100" stroke="#8b5cf6" stroke-width="1" stroke-opacity="0.4"/>

  <!-- Core circle -->
  <circle cx="100" cy="100" r="28" fill="url(#coreGrad)"/>

  <!-- MH text -->
  <text x="100" y="107"
    font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
    font-size="18" font-weight="900" fill="white"
    text-anchor="middle" letter-spacing="-1">MH</text>
</svg>
